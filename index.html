<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>导航站 Pro Max（懒加载）</title><style>
:root{ --bg:#f7f7f5; --card:#fff; --text:#1f1f1f; }
body.dark{ --bg:#1e1e1e; --card:#2f2f2f; --text:#fff; }
body{ margin:0; font-family:-apple-system; background:var(--bg); color:var(--text); }

.grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:15px; }
.card{ display:flex; flex-direction:column; align-items:center; padding:10px 6px; border-radius:16px; background:var(--card); cursor:pointer; }
.card:active{ transform:scale(0.9); }
.card img{ width:36px; height:36px; margin-bottom:6px; }
.card span{ font-size:12px; text-align:center; }

.topbar{ position:sticky; top:0; background:var(--bg); padding:10px; }
input{ width:100%; padding:12px; border-radius:12px; border:none; }
.section-title{ padding:0 15px; margin-top:10px; }

.dock{ position:fixed; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:10px; background:rgba(255,255,255,0.7); backdrop-filter:blur(10px); padding:8px 14px; border-radius:20px; }

.upload-btn{ position:fixed; right:15px; bottom:80px; width:52px; height:52px; border-radius:50%; background:#4CAF50; color:#fff; border:none; }

.loader{ text-align:center; padding:20px; font-size:12px; opacity:.6; }
</style></head>
<body><div class="topbar">
  <input id="search" placeholder="🔍 搜索" oninput="resetAndRender()">
</div><div id="content"></div>
<div id="loader" class="loader">加载中...</div><input type="file" id="fileInput" style="display:none" accept=".html" />
<button class="upload-btn" onclick="triggerFile()">📂</button><div class="dock">
  <button onclick="scrollTopFast()">⬆️</button>
  <button onclick="toggleDark()">🌙</button>
  <button onclick="updateFromLast()">🔄</button>
</div><script>
let data = JSON.parse(localStorage.getItem("nav")) || [];
let lastRaw = localStorage.getItem("nav_raw") || "";
let recent = JSON.parse(localStorage.getItem("nav_recent")||"[]");
let freq = JSON.parse(localStorage.getItem("nav_freq")||"{}");

const BATCH = 120; // 每次加载数量
let renderIndex = 0;
let flatList = [];

function triggerFile(){ fileInput.click(); }
fileInput.onchange=e=>{ if(e.target.files[0]) readFile(e.target.files[0]); };

function readFile(file){
  let r=new FileReader();
  r.onload=()=>{ lastRaw=r.result; localStorage.setItem('nav_raw',lastRaw); data=parse(lastRaw); save(); resetAndRender(); };
  r.readAsText(file);
}

function updateFromLast(){ if(!lastRaw)return alert('先导入'); data=parse(lastRaw); save(); resetAndRender(); }

function parse(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  let result = [];

  doc.querySelectorAll('DT').forEach(dt => {
    const h3 = dt.querySelector('h3');
    const dl = dt.querySelector('dl');
    if(h3 && dl){
      let links=[];
      dl.querySelectorAll('a').forEach(a=>{
        if(a.href) links.push({name:a.innerText||a.href,url:a.href});
      });
      if(links.length) result.push({category:h3.innerText,items:links});
    }
  });

  if(result.length===0){
    let allLinks=[...doc.querySelectorAll('a')];
    result.push({category:'📚 我的书签',items:allLinks.map(a=>({name:a.innerText||a.href,url:a.href}))});
  }

  return result;
}

function icon(url){ try{return 'https://www.google.com/s2/favicons?domain='+new URL(url).hostname;}catch{return '';} }

function openLink(url){
  recent=[url,...recent.filter(u=>u!==url)].slice(0,20);
  freq[url]=(freq[url]||0)+1;
  localStorage.setItem('nav_recent',JSON.stringify(recent));
  localStorage.setItem('nav_freq',JSON.stringify(freq));
  window.open(url,'_blank');
}

function buildFlatList(){
  let q=(search.value||'').toLowerCase();
  flatList=[];
  data.forEach(cat=>{
    cat.items.forEach(i=>{
      if(i.name.toLowerCase().includes(q)){
        flatList.push(i);
      }
    });
  });
  flatList.sort((a,b)=>(freq[b.url]||0)-(freq[a.url]||0));
}

function renderBatch(){
  let c=content;
  let slice=flatList.slice(renderIndex, renderIndex+BATCH);

  let html = `<div class='grid'>` + slice.map(i=>
    `<div class="card" onclick="openLink('${i.url}')">
      <img src="${icon(i.url)}"><span>${i.name}</span>
    </div>`
  ).join('') + `</div>`;

  c.insertAdjacentHTML('beforeend', html);
  renderIndex += BATCH;

  if(renderIndex >= flatList.length){
    loader.innerText = '已加载全部';
  }
}

function resetAndRender(){
  content.innerHTML='';
  renderIndex=0;
  buildFlatList();
  renderBatch();
}

// 滚动触发加载
window.addEventListener('scroll', ()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    renderBatch();
  }
});

function scrollTopFast(){ window.scrollTo({top:0,behavior:'smooth'}); }
function toggleDark(){ document.body.classList.toggle('dark'); }
function save(){ localStorage.setItem('nav',JSON.stringify(data)); }

resetAndRender();
</script></body>
</html>
