<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>导航站 Pro Max</title><style>
:root{
  --bg:#f7f7f5; --card:#ffffff; --text:#1f1f1f; --accent:#e9e9e7;
}
body.dark{ --bg:#1e1e1e; --card:#2f2f2f; --text:#fff; --accent:#3a3a3a; }

*{ -webkit-tap-highlight-color: transparent; }
body{ margin:0; font-family:-apple-system; background:var(--bg); color:var(--text); }

/* iPhone style grid */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:15px;
}

.card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px 6px;
  border-radius:16px;
  background:var(--card);
  cursor:pointer;
  transition:.15s;
}

.card:active{
  transform:scale(0.92);
}

.card img{
  width:36px;
  height:36px;
  margin-bottom:6px;
}

.card span{
  font-size:12px;
  text-align:center;
}

.topbar{
  position:sticky;
  top:0;
  background:var(--bg);
  padding:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

.section-title{
  padding:0 15px;
  font-size:14px;
  margin-top:10px;
}

/* bottom dock */
.dock{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  padding:8px 14px;
  border-radius:20px;
}

.dock button{
  background:none;
  border:none;
  font-size:18px;
}

</style></head><body><div class="topbar">
  <input id="search" placeholder="🔍 搜索" oninput="render()">
</div><div id="content"></div><div class="dock">
  <button onclick="scrollTopFast()">⬆️</button>
  <button onclick="toggleDark()">🌙</button>
</div><script>
let data = JSON.parse(localStorage.getItem("nav")) || [];
let pinned = JSON.parse(localStorage.getItem("nav_pin")||"[]");
let recent = JSON.parse(localStorage.getItem("nav_recent")||"[]");

function icon(url){ try{return 'https://www.google.com/s2/favicons?domain='+new URL(url).hostname;}catch{return '';} }

function addRecent(url){
  recent=[url,...recent.filter(u=>u!==url)].slice(0,20);
  localStorage.setItem('nav_recent',JSON.stringify(recent));
}

function openLink(url){ addRecent(url); window.open(url,'_blank'); }

function render(){
  let q=(document.getElementById('search').value||'').toLowerCase();
  let c=document.getElementById('content');
  c.innerHTML='';

  if(pinned.length){
    c.innerHTML+=`<div class='section-title'>⭐ 常用</div><div class='grid'>`+
    pinned.map(u=>`<div class="card" onclick="openLink('${u}')"><img src="${icon(u)}"><span>${new URL(u).hostname}</span></div>`).join('')+
    `</div>`;
  }

  if(recent.length){
    c.innerHTML+=`<div class='section-title'>🕘 最近</div><div class='grid'>`+
    recent.map(u=>`<div class="card" onclick="openLink('${u}')"><img src="${icon(u)}"><span>${new URL(u).hostname}</span></div>`).join('')+
    `</div>`;
  }

  data.forEach(cat=>{
    let items=cat.items.filter(i=>i.name.toLowerCase().includes(q));
    if(!items.length) return;

    c.innerHTML+=`<div class='section-title'>${cat.category}</div><div class='grid'>`+
    items.map(i=>`<div class="card" onclick="openLink('${i.url}')"><img src="${icon(i.url)}"><span>${i.name}</span></div>`).join('')+
    `</div>`;
  });
}

function scrollTopFast(){ window.scrollTo({top:0,behavior:'smooth'}); }
function toggleDark(){ document.body.classList.toggle('dark'); }

render();
</script></body>
</html>
