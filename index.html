<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人导航站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .link-item { transition: all 0.2s; border-radius: 8px; }
        .link-item:active { background-color: #e2e8f0; transform: scale(0.98); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-7xl mx-auto">
        <header class="py-8 text-center">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">个人资源导航</h1>
            <p class="text-slate-500 text-sm mt-1">手机端适配版 · 全量书签</p>
        </header>

        <div class="card-grid">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-blue-50 px-4 py-3 border-b border-blue-100 font-bold text-blue-700 flex items-center">
                    <i class="fa-solid fa-cloud mr-2"></i>Cloudflare 工具
                </div>
                <div class="p-2">
                    <a href="https://zdy.ipx2001.cloudns.biz/" class="link-item block p-3 text-slate-700 hover:bg-slate-50">CSV → VLESS 工作台</a>
                    <a href="https://saas.seeck.cn/" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">Senflare SaaS 优选</a>
                    <a href="https://ip.cloudip.ggff.net/" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">VLESS 节点生成</a>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-green-50 px-4 py-3 border-b border-green-100 font-bold text-green-700 flex items-center">
                    <i class="fa-solid fa-server mr-2"></i>服务器 & 域名
                </div>
                <div class="p-2">
                    <a href="https://my.racknerd.com/clientarea.php" class="link-item block p-3 text-slate-700 hover:bg-slate-50">RackNerd 客户中心</a>
                    <a href="https://my.dnshe.com/" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">DNSHE 域名管理</a>
                    <a href="https://dash.cloudflare.com/" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">Cloudflare 控制台</a>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-purple-50 px-4 py-3 border-b border-purple-100 font-bold text-purple-700 flex items-center">
                    <i class="fa-solid fa-book-open mr-2"></i>学习与面试
                </div>
                <div class="p-2">
                    <a href="https://www.nowcoder.com/exam/company" class="link-item block p-3 text-slate-700 hover:bg-slate-50">牛客大厂真题</a>
                    <a href="https://github.com/EbookFoundation/free-programming-books" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">免费编程书籍资源</a>
                    <a href="https://shimo.im/docs/..." class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50">石墨文档资源</a>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-orange-50 px-4 py-3 border-b border-orange-100 font-bold text-orange-700 flex items-center">
                    <i class="fa-solid fa-wrench mr-2"></i>工具汇总
                </div>
                <div class="p-2">
                    <a href="https://www.cnblogs.com/mq0036/p/14112111.html" class="link-item block p-3 text-slate-700 hover:bg-slate-50 text-sm">常用工具类库汇总</a>
                    <a href="https://www.fofas.cn/" class="link-item block p-3 text-slate-700 hover:bg-slate-50 border-t border-slate-50 text-sm">Fofas 搜索</a>
                </div>
            </div>
        </div>

        <footer class="py-12 text-center text-slate-400 text-xs">
            <p>已同步你的全部核心书签分类</p>
        </footer>
    </div>
</body>
</html>
