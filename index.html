<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>高级导航站</title>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#111;
  --muted:#666;
}
body.dark{
  --bg:#0f0f0f;
  --card:#1e1e1e;
  --text:#fff;
  --muted:#aaa;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}
h1{font-size:20px;}
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.container{padding:20px;}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}
.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.card h3{margin-top:0;}
a{
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  color:var(--text);
  padding:6px;
  border-radius:8px;
}
a:hover{background:rgba(0,0,0,.05);}
.icon{width:18px;height:18px;}/* 管理面板 */ .admin{ margin-top:30px; padding:15px; background:var(--card); border-radius:12px; } .admin input{ margin:5px 0; } .small{font-size:12px;color:var(--muted);} </style>

</head>
<body><header>
  <h1>🚀 高级导航站</h1>
  <button onclick="toggleDark()">🌙/☀️</button>
</header><div class="container"><input id="search" placeholder="搜索网站..." oninput="render()" /><div class="grid" id="grid"></div><!-- 可编辑后台 --><div class="admin">
  <h3>⚙️ 快速添加网站（本地存储）</h3>
  <input id="name" placeholder="网站名称" />
  <input id="url" placeholder="网址 https://" />
  <button onclick="addSite()">添加</button>
  <p class="small">数据保存在浏览器localStorage（无服务器后台）</p>
</div></div><script>
let data = JSON.parse(localStorage.getItem("navdata")) || [
  {category:"常用工具",items:[
    {name:"Google",url:"https://google.com"},
    {name:"GitHub",url:"https://github.com"},
    {name:"YouTube",url:"https://youtube.com"}
  ]}
];

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(cat=>{
    let items = cat.items.filter(i=>i.name.toLowerCase().includes(q));
    if(items.length===0) return;

    let card = document.createElement("div");
    card.className="card";

    let html = `<h3>${cat.category}</h3>`;

    items.forEach(i=>{
      html += `<a href='${i.url}' target='_blank'>🌐 ${i.name}</a>`;
    });

    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function addSite(){
  let name = document.getElementById("name").value;
  let url = document.getElementById("url").value;

  if(!name || !url) return;

  data[0].items.push({name,url});
  localStorage.setItem("navdata",JSON.stringify(data));

  document.getElementById("name").value="";
  document.getElementById("url").value="";

  render();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();
</script></body>
</html>
